<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
</head>

<body>

<center>

<h2>Login Page</h2>

<form action="dashboard.html">

Username:
<input type="text"
pattern="[A-Za-z][A-Za-z0-9]*"
title="Username must start with a letter and contain only letters and numbers"
required><br><br>

Password:
<input type="password"
pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).*"
title="Password must contain at least one uppercase letter, one lowercase letter, and one number"
required><br><br>

<input type="submit" value="Login">

</form>

<br>

<a href="forgot.html">Forgot Password?</a><br><br>

<p>Don't have an account? <a href="register.html">Create one</a></p>

</center>

</body>
</html>
